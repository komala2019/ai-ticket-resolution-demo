<div style="display:flex;flex-direction:column;gap:24px;">
  <!-- Header -->
  <div>
    <h1 style="margin:0 0 4px;font-size:24px;font-weight:700;color:var(--gray-900);letter-spacing:-0.02em;">Analytics</h1>
    <p style="margin:0;font-size:14px;color:var(--gray-500);">Last 14 days · updates with each resolved ticket.</p>
  </div>

  <!-- Metric cards -->
  <div class="metric-grid">
    <div *ngFor="let m of METRICS" class="metric-card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <div style="font-size:12.5px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--gray-500);">{{ m.label }}</div>
        <span class="metric-delta" [class.positive]="m.deltaUp" [class.negative]="!m.deltaUp">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" [style.stroke]="m.deltaUp ? 'var(--success-600)' : 'var(--error-600)'" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline [attr.points]="m.deltaUp ? '18 15 12 9 6 15' : '18 9 12 15 6 9'"/>
          </svg>
          {{ m.delta }}
        </span>
      </div>
      <div style="font-size:32px;font-weight:800;color:var(--gray-900);letter-spacing:-0.03em;line-height:1;">{{ m.value }}</div>
      <div style="font-size:12.5px;color:var(--gray-400);margin-top:6px;">{{ m.sub }}</div>
    </div>
  </div>

  <!-- Deflection trend -->
  <div class="analytics-card">
    <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px;">
      <div style="font-size:14px;font-weight:700;color:var(--gray-900);">Deflection trend</div>
      <div style="font-size:12.5px;color:var(--gray-400);">% tickets auto-resolved without human touch</div>
    </div>
    <svg [attr.viewBox]="'0 0 ' + trendW + ' ' + trendH" style="width:100%;height:auto;overflow:visible;">
      <!-- Y ticks -->
      <line *ngFor="let pct of [0, .25, .5, .75, 1]"
        [attr.x1]="padL" [attr.x2]="trendW - padR"
        [attr.y1]="yTick(pct)" [attr.y2]="yTick(pct)"
        stroke="var(--gray-100)" stroke-width="1"/>
      <text *ngFor="let pct of [0, .25, .5, .75, 1]"
        [attr.x]="padL - 6" [attr.y]="yTick(pct) + 4"
        text-anchor="end" font-size="10" fill="var(--gray-400)">{{ (pct * 63) | number:'1.0-0' }}%</text>
      <!-- Fill -->
      <polygon [attr.points]="trendFillPoints" fill="var(--tr-trend-fill)"/>
      <!-- Line -->
      <polyline [attr.points]="trendPoints" fill="none" stroke="var(--primary-500,#528BFF)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Dots -->
      <circle *ngFor="let v of TREND; let i = index"
        [attr.cx]="xLabelX(i)"
        [attr.cy]="padT + (trendH - padT - padB) - (v / 63) * (trendH - padT - padB) * animPct"
        r="3.5" fill="var(--primary-500,#528BFF)" stroke="var(--tr-dot-stroke)" stroke-width="1.5"/>
      <!-- X labels -->
      <text *ngFor="let idx of xTicks()"
        [attr.x]="xLabelX(idx)" [attr.y]="trendH - 4"
        text-anchor="middle" font-size="10" fill="var(--gray-400)">{{ xLabel(idx) }}</text>
    </svg>
  </div>

  <!-- Bottom row: mix + flywheel -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
    <!-- Resolution mix -->
    <div class="analytics-card">
      <div style="font-size:14px;font-weight:700;color:var(--gray-900);margin-bottom:14px;">Resolution mix</div>
      <!-- Stacked bar -->
      <div style="height:18px;border-radius:9px;overflow:hidden;display:flex;margin-bottom:14px;background:var(--gray-100);">
        <div *ngFor="let m of MIX; let i = index"
          [style.width]="mixPct(m) + '%'"
          [style.background]="wheelColors[i]"
          style="transition:width .6s ease;"></div>
      </div>
      <!-- Legend -->
      <div style="display:flex;flex-direction:column;gap:9px;">
        <div *ngFor="let m of MIX; let i = index" style="display:flex;align-items:center;justify-content:space-between;">
          <div style="display:flex;align-items:center;gap:9px;">
            <span style="width:10px;height:10px;border-radius:2px;flex-shrink:0;" [style.background]="wheelColors[i]"></span>
            <span style="font-size:13.5px;color:var(--gray-700);">{{ m.label }}</span>
          </div>
          <div style="display:flex;align-items:center;gap:10px;">
            <span style="font-size:13.5px;font-weight:700;color:var(--gray-900);font-family:'Roboto Mono',monospace;">{{ m.count }}</span>
            <span style="font-size:12px;color:var(--gray-400);width:34px;text-align:right;">{{ mixPct(m) }}%</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Resolution flywheel -->
    <div class="analytics-card">
      <div style="font-size:14px;font-weight:700;color:var(--gray-900);margin-bottom:10px;">Resolution flywheel</div>
      <div style="display:flex;align-items:center;gap:16px;">
        <!-- SVG wheel -->
        <svg viewBox="0 0 240 240" style="width:150px;height:150px;flex-shrink:0;">
          <g *ngFor="let s of FLYWHEEL; let i = index"
            (mouseenter)="activeWheel = i" (mouseleave)="activeWheel = null"
            style="cursor:pointer;">
            <path [attr.d]="wheelPath(i, FLYWHEEL.length)"
              [attr.stroke]="wheelColors[i]"
              [attr.stroke-width]="activeWheel === i ? 28 : 22"
              fill="none"
              stroke-linecap="round"
              style="transition:stroke-width .15s;"/>
          </g>
          <!-- Center -->
          <text x="120" y="116" text-anchor="middle" font-size="11" font-weight="700" fill="var(--gray-700)">Flywheel</text>
          <text x="120" y="131" text-anchor="middle" font-size="10" fill="var(--gray-400)">{{ FLYWHEEL.length }} stages</text>
        </svg>
        <!-- Legend -->
        <div style="display:flex;flex-direction:column;gap:7px;flex:1;">
          <div *ngFor="let s of FLYWHEEL; let i = index" style="display:flex;align-items:flex-start;gap:8px;"
            (mouseenter)="activeWheel = i" (mouseleave)="activeWheel = null"
            [style.opacity]="activeWheel !== null && activeWheel !== i ? 0.4 : 1"
            style="cursor:pointer;transition:opacity .12s;">
            <span style="width:9px;height:9px;border-radius:2px;flex-shrink:0;margin-top:3px;" [style.background]="wheelColors[i]"></span>
            <div>
              <div style="font-size:12.5px;font-weight:600;color:var(--gray-800);">{{ s.label }}</div>
              <div style="font-size:11.5px;color:var(--gray-500);">{{ s.desc }}</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
