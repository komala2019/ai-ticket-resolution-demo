# Netlify build config — used when you connect this repo to Netlify.
# (For the drag-and-drop "Netlify Drop" route you don't need this; just
#  drop the built `dist-build/` folder.)
[build]
  command = "npm run build"
  publish = "dist-build"

[build.environment]
  # Angular 15 builds reliably on Node 18. Netlify will use this version
  # regardless of your local Node version.
  NODE_VERSION = "18"

# Proxy /health and /api/* to the deployed backend.
# Set BACKEND_URL in Netlify → Site configuration → Environment variables.
[[redirects]]
  from = "/health"
  to = ":BACKEND_URL/health"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = ":BACKEND_URL/api/:splat"
  status = 200
  force = true

# SPA fallback so deep links / refreshes resolve to the Angular app.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
